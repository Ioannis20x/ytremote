<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #ff6b6b;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.connected { background: #4ecdc4; }
    .status-dot.disconnected { background: #ff6b6b; }

    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #4ecdc4; }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4ecdc4;
      color: #1a1a2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #45b7aa; }

    .song-info {
      margin-top: 12px;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      font-size: 13px;
    }
    .song-info .title { font-weight: 600; color: #fff; }
    .song-info .artist { color: #aaa; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>🎵 YTRemote</h1>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Wird geprüft...</span>
  </div>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="wss://ytremote.example.com">

  <label for="pairingCode">Pairing-Code</label>
  <input type="text" id="pairingCode" placeholder="mein-geheimer-code">

  <button id="connectBtn">Verbinden</button>

  <div class="song-info" id="songInfo" style="display: none;">
    <div class="title" id="songTitle"></div>
    <div class="artist" id="songArtist"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
