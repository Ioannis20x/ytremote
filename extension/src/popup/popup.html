<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4ecdc4 0%, #2ab5ad 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f0f1a;
      font-size: 14px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .header-text span {
      font-size: 11px;
      color: #666;
    }

    /* === Status-Banner === */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected {
      background: #4ecdc4;
      box-shadow: 0 0 8px rgba(78, 205, 196, 0.4);
    }
    .status-dot.error {
      background: #ff6b6b;
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
    }
    .status-text {
      font-size: 12px;
      color: #888;
    }
    .status-text.connected { color: #4ecdc4; }
    .status-text.error { color: #ff6b6b; }

    /* === Formular === */
    .form-section {
      padding: 16px 18px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #444;
      font-size: 12px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: rgba(78, 205, 196, 0.5);
      background: rgba(78, 205, 196, 0.04);
    }
    .form-group input::placeholder {
      color: #444;
    }

    /* === Button === */
    .btn-connect {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4ecdc4 0%, #2ab5ad 100%);
      color: #0f0f1a;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-connect:hover { opacity: 0.9; }
    .btn-connect:active { transform: scale(0.98); }
    .btn-connect i { font-size: 12px; }

    /* === Now Playing === */
    .now-playing {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .np-thumb {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .np-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .np-thumb i {
      color: #333;
      font-size: 18px;
    }
    .np-info {
      flex: 1;
      min-width: 0;
    }
    .np-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-artist {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-status {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #4ecdc4;
      font-size: 11px;
    }
    .np-status i { font-size: 10px; }

    /* === Footer === */
    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-link {
      font-size: 11px;
      color: #444;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .footer-link:hover { color: #888; }
    .footer-link i { font-size: 10px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <i class="fa-solid fa-music"></i>
    </div>
    <div class="header-text">
      <h1>YTRemote</h1>
      <span>YouTube Music Fernbedienung</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-banner">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Wird geprüft...</span>
  </div>

  <!-- Formular -->
  <div class="form-section">
    <div class="form-group">
      <label>Server</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-server"></i>
        <input type="text" id="serverUrl" placeholder="wss://ytremote.example.com" spellcheck="false">
      </div>
    </div>
    <div class="form-group">
      <label>Pairing-Code</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input type="text" id="pairingCode" placeholder="Dein geheimer Code" spellcheck="false">
      </div>
    </div>
    <button class="btn-connect" id="connectBtn">
      <i class="fa-solid fa-link"></i>
      Verbinden
    </button>
  </div>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying" style="display: none;">
    <div class="np-thumb">
      <img id="npThumb" src="" alt="" style="display: none;">
      <i class="fa-solid fa-music" id="npThumbPlaceholder"></i>
    </div>
    <div class="np-info">
      <div class="np-title" id="npTitle"></div>
      <div class="np-artist" id="npArtist"></div>
    </div>
    <div class="np-status" id="npStatus">
      <i class="fa-solid fa-volume-high"></i>
      <span>Läuft</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/ioannisdev/ytremote" target="_blank" class="footer-link">
      <i class="fa-brands fa-github"></i>
      ioannisdev/ytremote
    </a>
    <span class="footer-link" style="cursor: default;">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
